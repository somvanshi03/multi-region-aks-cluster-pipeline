name: Create Two AKS Clusters in Different Regions

on:
  workflow_dispatch:
    inputs:
      # Cluster 1 Configuration
      resource_group_1:
        description: 'Resource Group for Cluster 1'
        required: true
        type: string
        default: 'aks-rg-eastus'
      cluster_name_1:
        description: 'Cluster 1 Name'
        required: true
        type: string
        default: 'aks-cluster-eastus'
      region_1:
        description: 'Region for Cluster 1'
        required: true
        type: choice
        options:
          - eastus
          - eastus2
          - westus
          - westus2
          - westeurope
          - northeurope
          - southeastasia
          - japaneast
          - australiaeast
          - brazilsouth
        default: 'eastus'
      kubernetes_version_1:
        description: 'Kubernetes Version for Cluster 1 (e.g., 1.28, 1.29, 1.30, 1.31)'
        required: true
        type: string
        default: '1.29'
      
      # Cluster 2 Configuration
      resource_group_2:
        description: 'Resource Group for Cluster 2'
        required: true
        type: string
        default: 'aks-rg-westus'
      cluster_name_2:
        description: 'Cluster 2 Name'
        required: true
        type: string
        default: 'aks-cluster-westus'
      region_2:
        description: 'Region for Cluster 2'
        required: true
        type: choice
        options:
          - eastus
          - eastus2
          - westus
          - westus2
          - westeurope
          - northeurope
          - southeastasia
          - japaneast
          - australiaeast
          - brazilsouth
        default: 'westus'
      kubernetes_version_2:
        description: 'Kubernetes Version for Cluster 2 (e.g., 1.28, 1.29, 1.30, 1.31)'
        required: true
        type: string
        default: '1.29'
      
      # Common Settings
      node_count:
        description: 'Initial node count per cluster'
        required: true
        type: string
        default: '2'
      node_vm_size:
        description: 'VM Size for nodes'
        required: true
        type: choice
        options:
          - Standard_D2s_v3
          - Standard_D4s_v3
          - Standard_D8s_v3
          - Standard_F2s_v2
          - Standard_F4s_v2
          - Standard_F8s_v2
          - Standard_E2s_v3
          - Standard_F2as_v6
        default: 'Standard_D2s_v3'
      enable_autoscaler:
        description: 'Enable cluster autoscaler?'
        required: true
        type: boolean
        default: true
      min_nodes:
        description: 'Minimum nodes (if autoscaler enabled)'
        required: true
        type: string
        default: '1'
      max_nodes:
        description: 'Maximum nodes (if autoscaler enabled)'
        required: true
        type: string
        default: '3'
      network_plugin:
        description: 'Network plugin'
        required: true
        type: choice
        options:
          - azure
          - kubenet
        default: 'azure'

permissions:
  id-token: write
  contents: read

env:
  LTS_VERSIONS: "1.27 1.28 1.29 1.30 1.31 1.32"  # LTS versions as of 2026

jobs:
  create-two-aks-clusters:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_AKS_CREDENTIALS }}
        enable-AzPSSession: false
        environment: azurecloud
        
    - name: Export ARM creds for Terraform (from AZURE_AKS_CREDENTIALS)
      run: |
        CREDS='${{ secrets.AZURE_AKS_CREDENTIALS }}'
        echo "$CREDS" | jq -r '
        "ARM_CLIENT_ID=\(.clientId)\n" +
        "ARM_CLIENT_SECRET=\(.clientSecret)\n" +
        "ARM_TENANT_ID=\(.tenantId)\n" +
        "ARM_SUBSCRIPTION_ID=\(.subscriptionId)\n"
        ' >> $GITHUB_ENV

    - name: Validate Input Parameters
      run: |
        echo "========================================="
        echo "Validating input parameters"
        echo "========================================="
        
        # Check if cluster names are different
        if [ "${{ github.event.inputs.cluster_name_1 }}" == "${{ github.event.inputs.cluster_name_2 }}" ]; then
          echo "❌ Error: Cluster names must be different"
          exit 1
        fi
        
        # Check if resource groups are different (recommended)
        if [ "${{ github.event.inputs.resource_group_1 }}" == "${{ github.event.inputs.resource_group_2 }}" ]; then
          echo "⚠️ Warning: Both clusters are in the same resource group"
          echo "This is allowed but not recommended for multi-region deployments"
        fi
        
        # Validate Kubernetes versions
        for version in "${{ github.event.inputs.kubernetes_version_1 }}" "${{ github.event.inputs.kubernetes_version_2 }}"; do
          if ! [[ $version =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "❌ Error: Invalid version format: $version. Use format like 1.29 or 1.29.100"
            exit 1
          fi
        done
        
        echo "✅ Validation passed"

    - name: Display Cluster Configuration
      run: |
        echo "========================================="
        echo "CLUSTER CONFIGURATION"
        echo "========================================="
        echo ""
        echo "CLUSTER 1:"
        echo "  Resource Group: ${{ github.event.inputs.resource_group_1 }}"
        echo "  Cluster Name: ${{ github.event.inputs.cluster_name_1 }}"
        echo "  Region: ${{ github.event.inputs.region_1 }}"
        echo "  Kubernetes Version: ${{ github.event.inputs.kubernetes_version_1 }}"
        echo ""
        echo "CLUSTER 2:"
        echo "  Resource Group: ${{ github.event.inputs.resource_group_2 }}"
        echo "  Cluster Name: ${{ github.event.inputs.cluster_name_2 }}"
        echo "  Region: ${{ github.event.inputs.region_2 }}"
        echo "  Kubernetes Version: ${{ github.event.inputs.kubernetes_version_2 }}"
        echo ""
        echo "COMMON SETTINGS:"
        echo "  Node Count: ${{ github.event.inputs.node_count }}"
        echo "  VM Size: ${{ github.event.inputs.node_vm_size }}"
        echo "  Network Plugin: ${{ github.event.inputs.network_plugin }}"
        echo "  Autoscaler Enabled: ${{ github.event.inputs.enable_autoscaler }}"
        echo "  Min Nodes: ${{ github.event.inputs.min_nodes }}"
        echo "  Max Nodes: ${{ github.event.inputs.max_nodes }}"
        echo "========================================="

    - name: Create Resource Group 1
      run: |
        echo "Creating/Verifying Resource Group 1: ${{ github.event.inputs.resource_group_1 }} in ${{ github.event.inputs.region_1 }}"
        
        if ! az group show --name ${{ github.event.inputs.resource_group_1 }} &>/dev/null; then
          az group create \
            --location ${{ github.event.inputs.region_1 }} \
            --resource-group ${{ github.event.inputs.resource_group_1 }} \
            --tags CreatedBy=GitHubActions CreatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ") Purpose="AKS Cluster 1" Region="${{ github.event.inputs.region_1 }}"
          echo "✅ Resource Group 1 created"
        else
          echo "✅ Resource Group 1 already exists"
        fi

    - name: Create Resource Group 2
      run: |
        echo "Creating/Verifying Resource Group 2: ${{ github.event.inputs.resource_group_2 }} in ${{ github.event.inputs.region_2 }}"
        
        if ! az group show --name ${{ github.event.inputs.resource_group_2 }} &>/dev/null; then
          az group create \
            --location ${{ github.event.inputs.region_2 }} \
            --resource-group ${{ github.event.inputs.resource_group_2 }} \
            --tags CreatedBy=GitHubActions CreatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ") Purpose="AKS Cluster 2" Region="${{ github.event.inputs.region_2 }}"
          echo "✅ Resource Group 2 created"
        else
          echo "✅ Resource Group 2 already exists"
        fi

    - name: Create AKS Cluster 1
      id: cluster1
      run: |
        echo "========================================="
        echo "Creating AKS Cluster 1: ${{ github.event.inputs.cluster_name_1 }} in ${{ github.event.inputs.region_1 }}"
        echo "========================================="
        
        # Check if cluster already exists
        if az aks show --name ${{ github.event.inputs.cluster_name_1 }} \
          --resource-group ${{ github.event.inputs.resource_group_1 }} &>/dev/null; then
          echo "⚠️ Cluster ${{ github.event.inputs.cluster_name_1 }} already exists. Skipping creation."
          
          # Get existing cluster info
          CLUSTER_INFO=$(az aks show \
            --name ${{ github.event.inputs.cluster_name_1 }} \
            --resource-group ${{ github.event.inputs.resource_group_1 }} \
            --query "{version:kubernetesVersion, fqdn:fqdn, powerState:powerState.code}" \
            -o json)
          
          echo "cluster1_status=exists" >> $GITHUB_OUTPUT
          echo "cluster1_version=$(echo $CLUSTER_INFO | jq -r '.version')" >> $GITHUB_OUTPUT
          echo "cluster1_fqdn=$(echo $CLUSTER_INFO | jq -r '.fqdn')" >> $GITHUB_OUTPUT
        else
          # Build autoscaler parameters
          AUTOSCALER_PARAMS=""
          if [ "${{ github.event.inputs.enable_autoscaler }}" == "true" ]; then
            AUTOSCALER_PARAMS="--enable-cluster-autoscaler --min-count ${{ github.event.inputs.min_nodes }} --max-count ${{ github.event.inputs.max_nodes }}"
          fi
          
          # Check if version is LTS
          VERSION="${{ github.event.inputs.kubernetes_version_1 }}"
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
          
          TIER_PARAMS="--tier standard"
          if echo "${{ env.LTS_VERSIONS }}" | grep -q "$MAJOR_MINOR"; then
            echo "⚠️ Version $VERSION is an LTS version. Adding Premium tier and LTS support plan."
            TIER_PARAMS="--tier premium --k8s-support-plan AKSLongTermSupport"
          fi
          
          # Create AKS cluster with appropriate tier
          az aks create \
            --name ${{ github.event.inputs.cluster_name_1 }} \
            --resource-group ${{ github.event.inputs.resource_group_1 }} \
            --kubernetes-version $VERSION \
            --node-count ${{ github.event.inputs.node_count }} \
            --node-vm-size ${{ github.event.inputs.node_vm_size }} \
            --enable-managed-identity \
            --network-plugin ${{ github.event.inputs.network_plugin }} \
            --generate-ssh-keys \
            --location ${{ github.event.inputs.region_1 }} \
            $AUTOSCALER_PARAMS \
            $TIER_PARAMS \
            --tags Environment=MultiRegion Purpose="Cluster1" Region="${{ github.event.inputs.region_1 }}" CreatedBy=GitHubActions CreatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get cluster details after creation
          CLUSTER_INFO=$(az aks show \
            --name ${{ github.event.inputs.cluster_name_1 }} \
            --resource-group ${{ github.event.inputs.resource_group_1 }} \
            --query "{fqdn:fqdn}" \
            -o json)
          
          echo "✅ AKS Cluster 1 created successfully"
          echo "cluster1_status=created" >> $GITHUB_OUTPUT
          echo "cluster1_version=$VERSION" >> $GITHUB_OUTPUT
          echo "cluster1_fqdn=$(echo $CLUSTER_INFO | jq -r '.fqdn')" >> $GITHUB_OUTPUT
        fi

    - name: Create AKS Cluster 2
      id: cluster2
      run: |
        echo "========================================="
        echo "Creating AKS Cluster 2: ${{ github.event.inputs.cluster_name_2 }} in ${{ github.event.inputs.region_2 }}"
        echo "========================================="
        
        # Check if cluster already exists
        if az aks show --name ${{ github.event.inputs.cluster_name_2 }} \
          --resource-group ${{ github.event.inputs.resource_group_2 }} &>/dev/null; then
          echo "⚠️ Cluster ${{ github.event.inputs.cluster_name_2 }} already exists. Skipping creation."
          
          # Get existing cluster info
          CLUSTER_INFO=$(az aks show \
            --name ${{ github.event.inputs.cluster_name_2 }} \
            --resource-group ${{ github.event.inputs.resource_group_2 }} \
            --query "{version:kubernetesVersion, fqdn:fqdn, powerState:powerState.code}" \
            -o json)
          
          echo "cluster2_status=exists" >> $GITHUB_OUTPUT
          echo "cluster2_version=$(echo $CLUSTER_INFO | jq -r '.version')" >> $GITHUB_OUTPUT
          echo "cluster2_fqdn=$(echo $CLUSTER_INFO | jq -r '.fqdn')" >> $GITHUB_OUTPUT
        else
          # Build autoscaler parameters
          AUTOSCALER_PARAMS=""
          if [ "${{ github.event.inputs.enable_autoscaler }}" == "true" ]; then
            AUTOSCALER_PARAMS="--enable-cluster-autoscaler --min-count ${{ github.event.inputs.min_nodes }} --max-count ${{ github.event.inputs.max_nodes }}"
          fi
          
          # Check if version is LTS
          VERSION="${{ github.event.inputs.kubernetes_version_2 }}"
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1-2)
          
          TIER_PARAMS="--tier standard"
          if echo "${{ env.LTS_VERSIONS }}" | grep -q "$MAJOR_MINOR"; then
            echo "⚠️ Version $VERSION is an LTS version. Adding Premium tier and LTS support plan."
            TIER_PARAMS="--tier premium --k8s-support-plan AKSLongTermSupport"
          fi
          
          # Create AKS cluster with appropriate tier
          az aks create \
            --name ${{ github.event.inputs.cluster_name_2 }} \
            --resource-group ${{ github.event.inputs.resource_group_2 }} \
            --kubernetes-version $VERSION \
            --node-count ${{ github.event.inputs.node_count }} \
            --node-vm-size ${{ github.event.inputs.node_vm_size }} \
            --enable-managed-identity \
            --network-plugin ${{ github.event.inputs.network_plugin }} \
            --generate-ssh-keys \
            --location ${{ github.event.inputs.region_2 }} \
            $AUTOSCALER_PARAMS \
            $TIER_PARAMS \
            --tags Environment=MultiRegion Purpose="Cluster2" Region="${{ github.event.inputs.region_2 }}" CreatedBy=GitHubActions CreatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Get cluster details after creation
          CLUSTER_INFO=$(az aks show \
            --name ${{ github.event.inputs.cluster_name_2 }} \
            --resource-group ${{ github.event.inputs.resource_group_2 }} \
            --query "{fqdn:fqdn}" \
            -o json)
          
          echo "✅ AKS Cluster 2 created successfully"
          echo "cluster2_status=created" >> $GITHUB_OUTPUT
          echo "cluster2_version=$VERSION" >> $GITHUB_OUTPUT
          echo "cluster2_fqdn=$(echo $CLUSTER_INFO | jq -r '.fqdn')" >> $GITHUB_OUTPUT
        fi

    - name: Get Cluster Credentials
      run: |
        echo "Getting cluster credentials..."
        
        # Get credentials for cluster 1
        az aks get-credentials \
          --name ${{ github.event.inputs.cluster_name_1 }} \
          --resource-group ${{ github.event.inputs.resource_group_1 }} \
          --overwrite-existing \
          --admin \
          --file kubeconfig-cluster1
        
        # Get credentials for cluster 2
        az aks get-credentials \
          --name ${{ github.event.inputs.cluster_name_2 }} \
          --resource-group ${{ github.event.inputs.resource_group_2 }} \
          --overwrite-existing \
          --admin \
          --file kubeconfig-cluster2
        
        echo "✅ Credentials saved to kubeconfig files"

    - name: Verify Cluster 1
      run: |
        echo "========================================="
        echo "Verifying Cluster 1: ${{ github.event.inputs.cluster_name_1 }}"
        echo "========================================="
        
        export KUBECONFIG=kubeconfig-cluster1
        
        # Get nodes
        echo "Nodes in Cluster 1:"
        kubectl get nodes -o wide || echo "Unable to get nodes (cluster may still be provisioning)"
        
        # Get cluster info
        echo "Cluster 1 Details:"
        az aks show \
          --name ${{ github.event.inputs.cluster_name_1 }} \
          --resource-group ${{ github.event.inputs.resource_group_1 }} \
          --query "{Version:kubernetesVersion, FQDN:fqdn, NodeCount:agentPoolProfiles[0].count, VMSize:agentPoolProfiles[0].vmSize}" \
          -o table

    - name: Verify Cluster 2
      run: |
        echo "========================================="
        echo "Verifying Cluster 2: ${{ github.event.inputs.cluster_name_2 }}"
        echo "========================================="
        
        export KUBECONFIG=kubeconfig-cluster2
        
        # Get nodes
        echo "Nodes in Cluster 2:"
        kubectl get nodes -o wide || echo "Unable to get nodes (cluster may still be provisioning)"
        
        # Get cluster info
        echo "Cluster 2 Details:"
        az aks show \
          --name ${{ github.event.inputs.cluster_name_2 }} \
          --resource-group ${{ github.event.inputs.resource_group_2 }} \
          --query "{Version:kubernetesVersion, FQDN:fqdn, NodeCount:agentPoolProfiles[0].count, VMSize:agentPoolProfiles[0].vmSize}" \
          -o table

    

    - name: Generate Summary Report
      run: |
        echo "========================================="
        echo "AKS CLUSTERS CREATION SUMMARY"
        echo "========================================="
        echo ""
        echo "CLUSTER 1:"
        echo "  Resource Group: ${{ github.event.inputs.resource_group_1 }}"
        echo "  Cluster Name: ${{ github.event.inputs.cluster_name_1 }}"
        echo "  Region: ${{ github.event.inputs.region_1 }}"
        echo "  Version: ${{ steps.cluster1.outputs.cluster1_version || github.event.inputs.kubernetes_version_1 }}"
        echo "  Status: ${{ steps.cluster1.outputs.cluster1_status || 'created' }}"
        echo "  FQDN: ${{ steps.cluster1.outputs.cluster1_fqdn || 'N/A' }}"
        echo ""
        echo "CLUSTER 2:"
        echo "  Resource Group: ${{ github.event.inputs.resource_group_2 }}"
        echo "  Cluster Name: ${{ github.event.inputs.cluster_name_2 }}"
        echo "  Region: ${{ github.event.inputs.region_2 }}"
        echo "  Version: ${{ steps.cluster2.outputs.cluster2_version || github.event.inputs.kubernetes_version_2 }}"
        echo "  Status: ${{ steps.cluster2.outputs.cluster2_status || 'created' }}"
        echo "  FQDN: ${{ steps.cluster2.outputs.cluster2_fqdn || 'N/A' }}"
        echo ""
        echo "COMMON SETTINGS:"
        echo "  Node Count: ${{ github.event.inputs.node_count }}"
        echo "  VM Size: ${{ github.event.inputs.node_vm_size }}"
        echo "  Network Plugin: ${{ github.event.inputs.network_plugin }}"
        echo "  Autoscaler: ${{ github.event.inputs.enable_autoscaler }} (Min: ${{ github.event.inputs.min_nodes }}, Max: ${{ github.event.inputs.max_nodes }})"
        echo "========================================="

    - name: Generate Detailed Report
      run: |
        cat << EOF > aks-clusters-report.md
        # AKS Multi-Region Clusters Report
        
        ## Overview
        - **Creation Time**: $(date)
        - **Created By**: GitHub Actions
        - **Workflow Run**: ${{ github.run_id }}
        
        ## Cluster 1 Details
        | Property | Value |
        |----------|-------|
        | Resource Group | ${{ github.event.inputs.resource_group_1 }} |
        | Cluster Name | ${{ github.event.inputs.cluster_name_1 }} |
        | Region | ${{ github.event.inputs.region_1 }} |
        | Kubernetes Version | ${{ steps.cluster1.outputs.cluster1_version || github.event.inputs.kubernetes_version_1 }} |
        | Status | ${{ steps.cluster1.outputs.cluster1_status || 'created' }} |
        | FQDN | ${{ steps.cluster1.outputs.cluster1_fqdn || 'N/A' }} |
        | Node Count | ${{ github.event.inputs.node_count }} |
        | VM Size | ${{ github.event.inputs.node_vm_size }} |
        
        ## Cluster 2 Details
        | Property | Value |
        |----------|-------|
        | Resource Group | ${{ github.event.inputs.resource_group_2 }} |
        | Cluster Name | ${{ github.event.inputs.cluster_name_2 }} |
        | Region | ${{ github.event.inputs.region_2 }} |
        | Kubernetes Version | ${{ steps.cluster2.outputs.cluster2_version || github.event.inputs.kubernetes_version_2 }} |
        | Status | ${{ steps.cluster2.outputs.cluster2_status || 'created' }} |
        | FQDN | ${{ steps.cluster2.outputs.cluster2_fqdn || 'N/A' }} |
        | Node Count | ${{ github.event.inputs.node_count }} |
        | VM Size | ${{ github.event.inputs.node_vm_size }} |
        
        ## Common Configuration
        | Setting | Value |
        |---------|-------|
        | Network Plugin | ${{ github.event.inputs.network_plugin }} |
        | Autoscaler Enabled | ${{ github.event.inputs.enable_autoscaler }} |
        | Autoscaler Range | ${{ github.event.inputs.min_nodes }} - ${{ github.event.inputs.max_nodes }} nodes |
        
        ## LTS Version Detection
        - **Cluster 1 Version**: ${{ github.event.inputs.kubernetes_version_1 }} - $(if echo "${{ env.LTS_VERSIONS }}" | grep -q "$(echo ${{ github.event.inputs.kubernetes_version_1 }} | cut -d. -f1-2)"; then echo "LTS (Premium tier)"; else echo "Standard tier"; fi)
        - **Cluster 2 Version**: ${{ github.event.inputs.kubernetes_version_2 }} - $(if echo "${{ env.LTS_VERSIONS }}" | grep -q "$(echo ${{ github.event.inputs.kubernetes_version_2 }} | cut -d. -f1-2)"; then echo "LTS (Premium tier)"; else echo "Standard tier"; fi)
        
        ## Test Application
        A test Nginx application has been deployed to both clusters in the 'test-app' namespace (if clusters were ready).
        
        ## Access Commands
        \`\`\`bash
        # Access Cluster 1
        export KUBECONFIG=kubeconfig-cluster1
        kubectl get nodes
        
        # Access Cluster 2
        export KUBECONFIG=kubeconfig-cluster2
        kubectl get nodes
        \`\`\`
        
        ## Next Steps
        1. Download kubeconfig files from artifacts
        2. Configure your local kubectl
        3. Deploy your applications
        4. Set up monitoring and alerts
        5. Configure CI/CD pipelines
        
        ## Resources
        - [AKS Documentation](https://docs.microsoft.com/azure/aks/)
        - [Kubernetes Versions](https://docs.microsoft.com/azure/aks/supported-kubernetes-versions)
        EOF
        
        cat aks-clusters-report.md

    - name: Upload Kubeconfig Files
      uses: actions/upload-artifact@v4
      with:
        name: kubeconfig-files-${{ github.run_id }}
        path: |
          kubeconfig-cluster1
          kubeconfig-cluster2
        retention-days: 30

    - name: Upload Cluster Report
      uses: actions/upload-artifact@v4
      with:
        name: aks-clusters-report-${{ github.run_id }}
        path: aks-clusters-report.md
        retention-days: 30

    - name: Send Success Notification
      if: success()
      run: |
        echo "========================================="
        echo "✅ MULTI-REGION AKS CLUSTERS CREATED SUCCESSFULLY"
        echo "========================================="
        echo "Cluster 1: ${{ github.event.inputs.cluster_name_1 }} in ${{ github.event.inputs.region_1 }}"
        echo "  Version: ${{ steps.cluster1.outputs.cluster1_version || github.event.inputs.kubernetes_version_1 }}"
        echo "  Status: ${{ steps.cluster1.outputs.cluster1_status || 'created' }}"
        echo ""
        echo "Cluster 2: ${{ github.event.inputs.cluster_name_2 }} in ${{ github.event.inputs.region_2 }}"
        echo "  Version: ${{ steps.cluster2.outputs.cluster2_version || github.event.inputs.kubernetes_version_2 }}"
        echo "  Status: ${{ steps.cluster2.outputs.cluster2_status || 'created' }}"
        echo ""
        echo "📁 Kubeconfig files and report uploaded as artifacts"
        echo "========================================="

    - name: Send Failure Notification
      if: failure()
      run: |
        echo "========================================="
        echo "❌ FAILED TO CREATE CLUSTERS"
        echo "========================================="
        echo "Check the logs for more details"
        echo "========================================="
